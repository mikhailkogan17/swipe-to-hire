services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    platform: linux/arm64   # RPi
    volumes:
      - db-data:/data
    env_file: .env
    environment:
      DB_PATH: /data/swipe-to-hire.db
    ports:
      - "${API_PORT:-3421}:3421"
    networks:
      - internal

  miniapp:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./packages/miniapp/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8209:80"
    networks:
      - internal

volumes:
  db-data:

networks:
  internal:
